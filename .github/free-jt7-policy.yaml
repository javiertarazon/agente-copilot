# Free JT7 policy file (autogenerated)
autonomy:
  mode: autonomous
risk:
  allow_high_risk_without_approval: true
  allow_destructive: true
  thresholds:
    low_keywords: [list, search, read, inspect, analyze]
    medium_keywords: [install, update, configure, build, test]
    high_keywords: [delete, drop, format, reset, remove, shutdown]
  destructive_patterns: ['rm ', rmdir, 'del ', 'drop ', 'truncate ', 'git reset --hard']
execution:
  retry:
    max_attempts: 3
  allowlist:
    enabled: false
    bins: [cmd, code, code.exe, get-childitem, get-content, git, node, npm, pnpm, powershell, pwsh, python, select-string]
quality_gate:
  required: true
skills:
  activation: ephemeral
  max_composed: 3
shell:
  strategy: cross-shell
  default: powershell
telemetry:
  level: full_sanitized
report:
  style: executive_technical
